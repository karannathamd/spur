name: Nightly

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build nightly
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      commits: ${{ steps.check.outputs.commits }}
      date: ${{ steps.meta.outputs.date }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      full_sha: ${{ steps.meta.outputs.full_sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Check for changes since last nightly
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST=$(gh release view nightly --json createdAt --jq .createdAt 2>/dev/null || echo "1970-01-01T00:00:00Z")
          COMMITS=$(git log --since="${LAST}" --oneline | wc -l)
          echo "commits=${COMMITS}" >> "$GITHUB_OUTPUT"
          if [ "${COMMITS}" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since last nightly — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "${COMMITS} new commit(s) since last nightly"
          fi

      - name: Set metadata
        id: meta
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build portable binaries (Ubuntu 22.04+ compatible)
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: dist
          push: false
          outputs: type=local,dest=./dist
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package binaries
        if: steps.check.outputs.skip != 'true'
        run: |
          DATE="${{ steps.meta.outputs.date }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          DIST="spur-nightly-${DATE}-${SHORT_SHA}-linux-amd64"

          mkdir -p "${DIST}/bin"
          for bin in spur spurctld spurd spurdbd; do
            cp "dist/bin/${bin}" "${DIST}/bin/"
          done

          cd "${DIST}/bin"
          for cmd in sbatch srun squeue scancel sinfo sacct scontrol; do
            ln -s spur "${cmd}"
          done
          cd ../..

          mkdir -p "${DIST}/etc"
          cp examples/spur.conf "${DIST}/etc/spur.conf.example"

          tar czf "${DIST}.tar.gz" "${DIST}"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"

      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: spur-nightly-linux-amd64
          path: |
            spur-*.tar.gz
            spur-*.tar.gz.sha256

  verify:
    name: Verify on ${{ matrix.name }}
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: "ubuntu:20.04"
            name: "Ubuntu 20.04"
          - distro: "ubuntu:22.04"
            name: "Ubuntu 22.04"
          - distro: "ubuntu:24.04"
            name: "Ubuntu 24.04"
          - distro: "ubuntu:26.04"
            name: "Ubuntu 26.04 (beta)"
            experimental: true
          - distro: "almalinux:8"
            name: "RHEL 8 (AlmaLinux)"
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: spur-nightly-linux-amd64

      - name: Test binaries on ${{ matrix.name }}
        run: |
          tar xzf spur-*.tar.gz
          BINDIR=$(ls -d spur-*/bin | head -1)
          docker run --rm -v "$(pwd)/${BINDIR}:/test:ro" ${{ matrix.distro }} bash -c '
            set -e
            echo "=== $(cat /etc/os-release | grep PRETTY_NAME | cut -d\" -f2) ==="
            echo "glibc: $(ldd --version 2>&1 | head -1)"
            for bin in spur spurctld spurd spurdbd; do
              /test/${bin} --help > /dev/null 2>&1
              echo "  ${bin}: OK"
            done
            echo "All binaries verified"
          '

  push-image:
    name: Push image to Docker Hub
    needs: [build, verify]
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: |
            rocm/spur:nightly
            rocm/spur:nightly-${{ needs.build.outputs.date }}
          cache-from: type=gha,scope=nightly-docker
          cache-to: type=gha,scope=nightly-docker,mode=max

  trivy-nightly-scan:
    name: Trivy nightly rescan
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: false
          load: true
          tags: spur:nightly-scan
          cache-from: type=gha,scope=nightly-docker

      - name: Scan image for vulnerabilities and secrets (SARIF)
        id: scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: spur:nightly-scan
          scanners: vuln,secret
          format: sarif
          output: trivy-nightly.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always() && steps.scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-nightly.sarif
          category: trivy-nightly

      - name: Prepare security reports directory
        if: always() && steps.scan.outcome != 'skipped'
        run: mkdir -p security-reports

      - name: Scan image (JSON report for internal integrations)
        id: json-scan
        if: always() && steps.scan.outcome != 'skipped'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: spur:nightly-scan
          scanners: vuln,misconfig,secret,license
          format: json
          output: security-reports/spur-nightly-image-trivy-result.json
          exit-code: "0"
          version: "v0.69.3"

      - name: Generate SBOM (SPDX)
        id: sbom
        if: always() && steps.json-scan.outcome == 'success'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: spur:nightly-scan
          format: spdx-json
          output: security-reports/spur-nightly-image-sbom.spdx.json
          exit-code: "0"
          version: "v0.69.3"

      - name: Generate scan-manifest.json
        if: always() && steps.json-scan.outcome == 'success'
        env:
          NIGHTLY_DATE: ${{ needs.build.outputs.date }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from collections import Counter
          from datetime import datetime, timezone

          reports_dir = "security-reports"
          report_file = "spur-nightly-image-trivy-result.json"
          sbom_file = "spur-nightly-image-sbom.spdx.json"
          report_path = os.path.join(reports_dir, report_file)

          nightly_date = os.environ.get("NIGHTLY_DATE", "unknown")
          short_sha = os.environ.get("SHORT_SHA", "unknown")
          release_tag = f"nightly-{nightly_date}-{short_sha}"

          vuln_summary = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "UNKNOWN": 0}
          scan_status = "success"

          if os.path.isfile(report_path):
              try:
                  with open(report_path) as f:
                      data = json.load(f)
                  counts = Counter()
                  for r in data.get("Results", []):
                      for v in r.get("Vulnerabilities", []):
                          counts[v.get("Severity", "UNKNOWN")] += 1
                  vuln_summary = {s: counts.get(s, 0) for s in vuln_summary}
              except Exception:
                  scan_status = "failed"
          else:
              scan_status = "failed"

          artifact = {
              "artifact": "spur-nightly-image",
              "scan_type": "image",
              "report_file": report_file,
              "sbom_file": sbom_file if os.path.isfile(os.path.join(reports_dir, sbom_file)) else "",
              "scan_status": scan_status,
              "vulnerability_summary": vuln_summary,
          }

          manifest = {
              "scan_id": f"{os.environ.get('GITHUB_RUN_ID', 'unknown')}-{datetime.now(timezone.utc).strftime('%Y%m%d%H%M%S')}",
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "ci": {
                  "provider": "github-actions",
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
                  "run_id": os.environ.get("GITHUB_RUN_ID", ""),
                  "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),
                  "sha": os.environ.get("GITHUB_SHA", ""),
                  "ref": os.environ.get("GITHUB_REF", ""),
              },
              "release": {
                  "repo_name": "spur",
                  "branch": "main",
                  "release_tag": release_tag,
              },
              "trivy_version": "0.36.0",
              "sbom_format": "spdx-json",
              "artifacts": [artifact],
              "summary": {
                  "total_artifacts": 1,
                  "successful": 1 if scan_status == "success" else 0,
                  "failed": 0 if scan_status == "success" else 1,
                  "sbom_generated": 1 if os.path.isfile(os.path.join(reports_dir, sbom_file)) else 0,
                  "total_vulnerabilities": vuln_summary,
              },
          }

          manifest_path = os.path.join(reports_dir, "scan-manifest.json")
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)

          print(f"Manifest written to: {manifest_path}")
          print(f"Release tag        : {release_tag}")
          print(f"Artifacts scanned  : {manifest['summary']['total_artifacts']}")
          print(f"Successful         : {manifest['summary']['successful']}")
          print(f"Vulnerabilities    : {json.dumps(vuln_summary)}")
          PYEOF

      - name: Upload security scan reports
        if: always() && steps.json-scan.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-reports
          path: security-reports/
          retention-days: 30

  release:
    name: Publish nightly
    needs: [build, verify, push-image]
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: spur-nightly-linux-amd64

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          DATE: ${{ needs.build.outputs.date }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          FULL_SHA: ${{ needs.build.outputs.full_sha }}
          COMMITS: ${{ needs.build.outputs.commits }}
        run: |
          # Delete existing nightly release + tag
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

          # Create fresh nightly release
          gh release create nightly \
            --title "Spur nightly (${DATE} · ${SHORT_SHA})" \
            --notes "$(cat <<EOF
          **Automated nightly build** from \`main\` at $(date -u +"%Y-%m-%d %H:%M UTC").

          Commit: [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${FULL_SHA})

          ${COMMITS} commit(s) since previous nightly.

          ### Install
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash -s -- nightly
          \`\`\`

          ### Docker
          \`\`\`bash
          docker pull rocm/spur:nightly
          \`\`\`
          EOF
          )" \
            --prerelease \
            spur-*.tar.gz spur-*.tar.gz.sha256

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# All jobs run on ephemeral GitHub-hosted runners.
# Zero secrets, zero self-hosted runners — safe for fork PRs.
jobs:
  deny:
    runs-on: ubuntu-latest
    env:
      CARGO_DENY_VERSION: "0.19.6"
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        run: rustup show
      - name: Install cargo-deny
        run: |
          curl -sL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /usr/local/bin --strip-components=1
      - name: Check dependencies
        run: cargo deny check

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        run: rustup show
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --workspace --exclude spur-ffi --all-targets --locked

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Build all targets
        run: cargo build --all-targets --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Test
        run: cargo test --locked

  coverage:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v7

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --exclude spur-ffi --locked --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: false
          tags: spur:ci
          outputs: type=docker,dest=/tmp/spur-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image
        uses: actions/upload-artifact@v7
        with:
          name: spur-image
          path: /tmp/spur-image.tar
          retention-days: 1

      - name: Extract release binaries from image
        run: |
          docker load -i /tmp/spur-image.tar
          CID=$(docker create spur:ci)
          mkdir -p /tmp/release-binaries
          for bin in spur spurctld spurd spurdbd spur-k8s-operator; do
            docker cp "$CID:/usr/local/bin/$bin" "/tmp/release-binaries/$bin"
          done
          docker rm "$CID"

      - name: Upload release binaries
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: /tmp/release-binaries/
          retention-days: 1

      - name: Pack E2E test assets
        run: |
          set -euo pipefail
          root=/tmp/e2e-assets/trusted-repo
          mkdir -p "$root"
          cp -r tests "$root/"
          cp -r scripts "$root/"

      - name: Upload E2E assets
        uses: actions/upload-artifact@v7
        with:
          name: e2e-assets
          path: /tmp/e2e-assets/trusted-repo
          retention-days: 1

  trivy-image-scan:
    name: Trivy image scan
    needs: build-docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: spur-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/spur-image.tar

      - name: Scan image for vulnerabilities and secrets (SARIF)
        id: scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: spur:ci
          scanners: vuln,secret
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "1"

      - name: Upload SARIF to GitHub Security
        if: always() && steps.scan.outcome != 'skipped' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Prepare security reports directory
        if: always() && steps.scan.outcome != 'skipped'
        run: mkdir -p security-reports

      - name: Scan image (JSON report for internal integrations)
        id: json-scan
        if: always() && steps.scan.outcome != 'skipped'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: spur:ci
          scanners: vuln,misconfig,secret,license
          format: json
          output: security-reports/spur-image-trivy-result.json
          exit-code: "0"

      - name: Generate SBOM (SPDX)
        id: sbom
        if: always() && steps.json-scan.outcome == 'success'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: spur:ci
          format: spdx-json
          output: security-reports/spur-image-sbom.spdx.json
          exit-code: "0"

      - name: Generate scan-manifest.json
        if: always() && steps.json-scan.outcome == 'success'
        run: |
          python3 - <<'PYEOF'
          import json, os
          from collections import Counter
          from datetime import datetime, timezone

          reports_dir = "security-reports"
          report_file = "spur-image-trivy-result.json"
          sbom_file = "spur-image-sbom.spdx.json"
          report_path = os.path.join(reports_dir, report_file)

          vuln_summary = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "UNKNOWN": 0}
          scan_status = "success"

          if os.path.isfile(report_path):
              try:
                  with open(report_path) as f:
                      data = json.load(f)
                  counts = Counter()
                  for r in data.get("Results", []):
                      for v in r.get("Vulnerabilities", []):
                          counts[v.get("Severity", "UNKNOWN")] += 1
                  vuln_summary = {s: counts.get(s, 0) for s in vuln_summary}
              except Exception:
                  scan_status = "failed"
          else:
              scan_status = "failed"

          artifact = {
              "artifact": "spur-image.tar",
              "scan_type": "image",
              "report_file": report_file,
              "sbom_file": sbom_file if os.path.isfile(os.path.join(reports_dir, sbom_file)) else "",
              "scan_status": scan_status,
              "vulnerability_summary": vuln_summary,
          }

          manifest = {
              "scan_id": f"{os.environ.get('GITHUB_RUN_ID', 'unknown')}-{datetime.now(timezone.utc).strftime('%Y%m%d%H%M%S')}",
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "ci": {
                  "provider": "github-actions",
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
                  "run_id": os.environ.get("GITHUB_RUN_ID", ""),
                  "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),
                  "sha": os.environ.get("GITHUB_SHA", ""),
                  "ref": os.environ.get("GITHUB_REF", ""),
              },
              "release": {
                  "repo_name": "spur",
                  "branch": os.environ.get("GITHUB_REF_NAME", "main"),
                  "release_tag": os.environ.get("GITHUB_SHA", "")[:12],
              },
              "trivy_version": "0.36.0",
              "sbom_format": "spdx-json",
              "artifacts": [artifact],
              "summary": {
                  "total_artifacts": 1,
                  "successful": 1 if scan_status == "success" else 0,
                  "failed": 0 if scan_status == "success" else 1,
                  "sbom_generated": 1 if os.path.isfile(os.path.join(reports_dir, sbom_file)) else 0,
                  "total_vulnerabilities": vuln_summary,
              },
          }

          manifest_path = os.path.join(reports_dir, "scan-manifest.json")
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)

          print(f"Manifest written to: {manifest_path}")
          print(f"Artifacts scanned : {manifest['summary']['total_artifacts']}")
          print(f"Successful        : {manifest['summary']['successful']}")
          print(f"Vulnerabilities   : {json.dumps(vuln_summary)}")
          PYEOF

      - name: Upload security scan reports
        if: always() && steps.json-scan.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-reports
          path: security-reports/
          retention-days: 30

  trivy-dockerfile-scan:
    name: Trivy Dockerfile scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Scan Dockerfile for misconfigurations
        id: scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          exit-code: "1"

      - name: Upload SARIF to GitHub Security
        if: always() && steps.scan.outcome != 'skipped' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
